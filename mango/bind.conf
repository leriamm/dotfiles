# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# ============================================
# System
# ============================================
bind=SUPER+ALT,r,spawn,/home/liam/.config/mango/bin/reload.sh
bind=SUPER,m,quit
bind=SUPER,q,killclient,

# ============================================
# Applications (matching niri)
# ============================================
bind=SUPER,Space,spawn,qs -c noctalia-shell ipc call launcher toggle
bind=SUPER,Return,spawn,kitty
bind=SUPER+CTRL,Return,spawn,kitty -T floating-kitty

# App Launchers
bind=SUPER,B,spawn,librewolf
bind=SUPER,D,spawn,vesktop
bind=SUPER,S,spawn,steam
bind=SUPER,Z,spawn,zed
bind=SUPER,Y,spawn,kitty -T floating-kitty -e yazi
# ============================================
# Window Focus (SUPER + Arrows - like niri)
# ============================================
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# ============================================
# Window Movement (SUPER + Shift + Arrows)
# ============================================
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# ============================================
# Workspace Navigation (Tags as Workspaces)
# ============================================
# Switch workspaces up/down
bind=SUPER+CTRL,Up,viewtoleft,0
bind=SUPER+CTRL,Down,viewtoright,0

# Move window to adjacent workspace
bind=SUPER+CTRL+ALT,Up,tagtoleft,0
bind=SUPER+CTRL+ALT,Down,tagtoright,0

# ============================================
# Workspaces (1-9) - Numbered tags
# SUPER+1-9 to view workspace 1-9, SUPER+SHIFT+1-9 to move window
# ============================================
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

# ============================================
# Monitor Navigation
# ============================================
bind=SUPER+CTRL,Left,focusmon,left
bind=SUPER+CTRL,Right,focusmon,right

bind=SUPER+SHIFT+CTRL,Left,tagmon,left
bind=SUPER+SHIFT+CTRL,Right,tagmon,right

# ============================================
# Window States & Actions
# ============================================
# Window Resizing
bind=SUPER,equal,resizewin,5,0
bind=SUPER,minus,resizewin,-5,0
bind=SUPER+CTRL,equal,resizewin,0,5
bind=SUPER+CTRL,minus,resizewin,0,-5

bind=SUPER,W,togglefloating

# Toggle overview
bind=SUPER,X,toggleoverview,
bind=ALT,Tab,toggleoverview,
bind=SUPER,Tab,focusstack,next

# Fullscreen and maximize
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=ALT,a,togglemaximizescreen,

# Minimize/restore
bind=SUPER,I,minimized,
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER+SHIFT,o,toggleoverlay,
bind=SUPER+SHIFT,g,toggleglobal,

# Scratchpad
bind=ALT,z,toggle_scratchpad

# ============================================
# Screenshot
# ============================================
bind=PRINT,spawn,/home/liam/.config/mango/bin/screenshot.sh

# ============================================
# Gaps & Layout
# ============================================
bind=CTRL,space,switch_layout
bind=CTRL,s,setlayout,scroller
bind=CTRL,d,setlayout,center_tile
bind=CTRL,t,setlayout,tile

# Scroller layout
bind=SUPER+ALT,f,set_proportion,1.0
bind=ALT,space,switch_proportion_preset,

# Gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
